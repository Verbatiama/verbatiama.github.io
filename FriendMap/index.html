<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Maps with Friends</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="map"></div>
    <script type="module" crossorigin src="assets/app.js"></script>
    <div id="menu">
      <button
        id="menu-toggle"
        type="button"
        aria-label="Minimise controls"
        aria-expanded="true"
        title="Minimise controls"
      ></button>
      <div id="people"></div>
      <div id="controls">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Alex" />
        </div>
        <div class="field">
          <label for="lat">Latitude</label>
          <input
            type="number"
            id="lat"
            name="lat"
            placeholder="-34.9257"
            step="any"
          />
        </div>
        <div class="field">
          <label for="lng">Longitude</label>
          <input
            type="number"
            id="lng"
            name="lng"
            placeholder="138.5997"
            step="any"
          />
        </div>
        <button id="submit">Submit</button>
        <button id="reload">Reload</button>
        <button id="find-restaurants" type="button">Restaurants</button>
      </div>
    </div>
    <aside
      id="restaurant-sidebar"
      aria-labelledby="restaurant-sidebar-title"
      aria-hidden="true"
    >
      <div class="restaurant-sidebar-header">
        <div>
          <span class="restaurant-sidebar-eyebrow">Restaurants</span>
          <h2 id="restaurant-sidebar-title">Meetup picks</h2>
        </div>
        <button
          id="restaurant-sidebar-close"
          type="button"
          aria-label="Close restaurant recommendations"
          title="Close restaurant recommendations"
        ></button>
      </div>
      <div id="restaurant-results" aria-live="polite"></div>
    </aside>
  </body>
</html>
